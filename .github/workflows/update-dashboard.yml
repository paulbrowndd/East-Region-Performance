name: Update Dashboard Data

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to update (M/D format, e.g. 5/1)'
        required: true
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run sigma_update.py
        env:
          SIGMA_API_TOKEN: ${{ secrets.SIGMA_API_TOKEN }}
        run: python3 sigma_update.py --date "${{ github.event.inputs.date }}" --data-file data.js
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git commit -m "Dashboard update: ${{ github.event.inputs.date }}" || echo "No changes"
          git push

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>East Region Hub & Spoke Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="top">
        <div class="header-brand">
          <img src="https://cdn-icons-png.flaticon.com/512/2331/2331970.png" alt="Parcel" class="dd-logo" />
          <h1>East Region Hub &amp; Spoke Dashboard <span class="header-tag">LIVE</span></h1>
        </div>
        <div class="controls">
          <label>
            View
            <select id="viewMode">
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
            </select>
          </label>
          <label id="dailyWrap">
            Daily date
            <select id="dailySelect"></select>
          </label>
          <label id="weeklyWrap">
            Week
            <select id="weeklySelect"></select>
          </label>
        </div>
      </header>

      <section class="kpis" id="kpis"></section>

      <section class="grid">
        <article>
          <div class="section-head"><h2>Top Spoke Issue Volume</h2></div>
          <div class="section-body" id="topIssues"></div>
        </article>
        <article>
          <div class="section-head"><h2>Barcode Status Totals</h2></div>
          <div class="table-wrap">
            <table id="barcodeTable"></table>
          </div>
        </article>
      </section>

      <section>
        <div class="section-head"><h2>Spoke Performance Detail</h2></div>
        <div class="table-wrap">
          <table id="spokeTable"></table>
        </div>
      </section>

      <section>
        <div class="section-head"><h2>Hub Performance Detail</h2></div>
        <div class="table-wrap">
          <table id="hubTable"></table>
        </div>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
